<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Are We Fooled By AI?</title>
  <script src="https://unpkg.com/jspsych@7.3.4"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3"></script>
  <script src="https://unpkg.com/@jspsych/plugin-image-keyboard-response@1.1.3"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.3"></script>
  <script src="https://unpkg.com/@jspsych/plugin-survey-multi-choice@1.1.3"></script>
  <script src="https://unpkg.com/@jspsych/plugin-preload@1.1.3"></script>
  <link href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:ital,wght@0,600;1,400&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --bg:       #f7f6f3;
      --surface:  #ffffff;
      --border:   #e2e0da;
      --text:     #1a1917;
      --muted:    #6b6860;
      --accent:   #2d5be3;
      --correct:  #1a7f4b;
      --incorrect:#c0392b;
      --radius:   8px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      font-family: 'Inter', sans-serif;
      color: var(--text);
    }

    /* ── jsPsych overrides ── */
    .jspsych-display-element {
      background: var(--bg) !important;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 32px 0;
    }
    .jspsych-content-wrapper {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .jspsych-content { max-width: 680px; width: 92vw; }

    /* ── Progress bar ── */
    #jspsych-progressbar-container {
      background: var(--surface) !important;
      border-bottom: 1px solid var(--border) !important;
      padding: 12px 24px !important;
    }
    #jspsych-progressbar-inner {
      background: var(--accent) !important;
      border-radius: 99px !important;
      height: 5px !important;
    }
    #jspsych-progressbar-container span {
      font-family: 'Inter', sans-serif !important;
      font-size: .75rem !important;
      color: var(--muted) !important;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 44px 48px;
      box-shadow: 0 2px 12px rgba(0,0,0,.06);
    }

    /* ── Consent page ── */
    .consent-title {
      font-family: 'Lora', serif;
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 4px;
      line-height: 1.3;
    }
    .main-title {
      font-family: 'Lora', serif;
      font-size: 1.9rem;
      font-weight: 600;
      text-align: center;
      margin-bottom: 18px;
      line-height: 1.3;
      color: var(--text);
    }
    .consent-subtitle {
      font-family: 'Lora', serif;
      font-style: italic;
      font-size: .95rem;
      color: var(--muted);
      margin-bottom: 28px;
      line-height: 1.5;
    }
    .consent-section { margin-bottom: 20px; }
    .consent-section h3 {
      font-size: .7rem;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 6px;
    }
    .consent-section p {
      font-size: .88rem;
      line-height: 1.7;
      color: #3a3835;
    }

    .consent-agree {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin: 24px 0 20px;
      padding: 14px 16px;
      background: #f0f3fc;
      border: 1px solid #c5d0f5;
      border-radius: var(--radius);
      cursor: pointer;
    }
    .consent-agree input[type=checkbox] {
      margin-top: 2px;
      accent-color: var(--accent);
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }
    .consent-agree label {
      font-size: .85rem;
      line-height: 1.55;
      color: #2a2a2a;
      cursor: pointer;
    }

    .btn {
      display: inline-block;
      padding: 11px 28px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-family: 'Inter', sans-serif;
      font-size: .9rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity .15s;
    }
    .btn:hover { opacity: .88; }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }

    /* ── Instructions ── */
    .page-title {
      font-family: 'Lora', serif;
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 20px;
    }
    .step-list { list-style: none; margin: 0 0 20px; display: flex; flex-direction: column; gap: 10px; }
    .step-list li {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      font-size: .9rem;
      line-height: 1.6;
      color: #3a3835;
    }
    .step-num {
      flex-shrink: 0;
      width: 24px; height: 24px;
      background: var(--accent);
      color: #fff;
      border-radius: 50%;
      font-size: .75rem;
      font-weight: 600;
      display: flex; align-items: center; justify-content: center;
      margin-top: 1px;
    }

    .key-row {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin: 20px 0;
    }
    .key-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .key {
      display: inline-flex;
      align-items: center; justify-content: center;
      width: 52px; height: 52px;
      border: 2px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      font-family: 'Inter', sans-serif;
      font-size: 1.2rem;
      font-weight: 600;
      box-shadow: 0 3px 0 var(--border);
      color: var(--text);
    }
    .key-label { font-size: .75rem; color: var(--muted); font-weight: 500; }

    .hint {
      font-size: .78rem;
      color: var(--muted);
      margin-top: 20px;
      text-align: center;
      letter-spacing: .03em;
    }
    .hint strong { color: var(--accent); }

    /* ── Cue ── */
    .cue-wrap { text-align: center; }
    .cue-label { font-size: .75rem; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 10px; }
    .cue-ms {
      font-family: 'Lora', serif;
      font-size: 4rem;
      font-weight: 600;
      color: var(--accent);
      line-height: 1;
    }
    .cue-unit { font-size: .85rem; color: var(--muted); margin-top: 4px; }
    .cue-ready { font-size: .88rem; color: var(--muted); margin-top: 16px; }

    /* ── Face image ── */
    .jspsych-image-keyboard-response img {
      border-radius: 10px;
      box-shadow: 0 4px 24px rgba(0,0,0,.15);
      max-width: 360px;
      max-height: 440px;
      display: block;
    }

    /* ── Response ── */
    .resp-wrap { text-align: center; }
    .resp-prompt { font-size: 1rem; color: var(--muted); margin-bottom: 20px; }

    /* ── Feedback ── */
    .feedback-wrap { text-align: center; }
    .feedback-icon { font-size: 2.8rem; margin-bottom: 8px; }
    .feedback-word { font-size: 1.1rem; font-weight: 600; }
    .feedback-correct   .feedback-word { color: var(--correct); }
    .feedback-incorrect .feedback-word { color: var(--incorrect); }
    .feedback-sub { font-size: .85rem; color: var(--muted); margin-top: 8px; }

    /* ── Attention check ── */
    .attn-wrap { text-align: center; }
    .attn-prompt {
      font-family: 'Lora', serif;
      font-size: 1.1rem;
      margin-bottom: 24px;
      line-height: 1.5;
    }
    .attn-options {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .attn-btn {
      padding: 10px 28px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      font-family: 'Inter', sans-serif;
      font-size: .9rem;
      cursor: pointer;
      transition: border-color .15s, background .15s;
    }
    .attn-btn:hover { border-color: var(--accent); background: #f0f3fc; }

    /* ── Break screen ── */
    .break-wrap { text-align: center; }

    /* ── Results ── */
    .results-wrap { text-align: center; }
    .results-title {
      font-family: 'Lora', serif;
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .accuracy-big {
      font-size: 3.5rem;
      font-weight: 700;
      color: var(--accent);
      margin: 16px 0 4px;
      font-family: 'Lora', serif;
    }
    .accuracy-label { font-size: .85rem; color: var(--muted); margin-bottom: 24px; }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin: 20px 0;
    }
    .stat-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 10px;
    }
    .stat-val { font-size: 1.4rem; font-weight: 600; color: var(--text); }
    .stat-lbl { font-size: .72rem; color: var(--muted); margin-top: 2px; }

    /* jspsych button plugin override */
    .jspsych-btn {
      font-family: 'Inter', sans-serif !important;
      padding: 10px 24px !important;
      border-radius: var(--radius) !important;
      border: 1px solid var(--border) !important;
      background: var(--surface) !important;
      color: var(--text) !important;
      font-size: .9rem !important;
      cursor: pointer !important;
      transition: border-color .15s !important;
    }
    .jspsych-btn:hover { border-color: var(--accent) !important; }

    /* survey plugin override */
    .jspsych-survey-multi-choice-question { text-align: left; }

    .fixation { font-size: 2rem; color: var(--muted); text-align: center; }
  </style>
</head>
<body>
<script>
/* ═══════════════════════════════════════════════════════════════
   STIMULUS POOLS
   Format: {n}.{R|S}.{ethnicity}.{gender}.png
═══════════════════════════════════════════════════════════════ */
const ETHNICITIES = ['B','EA','SA','W'];
const NUMBERS     = Array.from({length:50}, (_,i) => i+1);

function buildPool(type, gender) {
  const folder = type==='real' ? 'Real faces' : 'Synthetic faces';
  const code   = type==='real' ? 'R' : 'S';
  return NUMBERS.flatMap(n =>
    ETHNICITIES.map(e => ({
      img: `Stimuli/${folder}/${n}.${code}.${e}.${gender}.png`,
      type, gender, ethnicity: e
    }))
  );
}

const POOL_REAL_F = buildPool('real','F');
const POOL_REAL_M = buildPool('real','M');
const POOL_AI_F   = buildPool('ai',  'F');
const POOL_AI_M   = buildPool('ai',  'M');

/* ═══════════════════════════════════════════════════════════════
   CONFIG
═══════════════════════════════════════════════════════════════ */
const CONFIG = {
  // Main: 30 trials — 15 real (8F+7M) + 15 AI (8F+7M)
  nRealF: 8, nRealM: 7,
  nAIF:   8, nAIM:   7,

  durations: [500, 1000, 3000],

  keyReal: 'f',
  keyAI:   'j',

  nPractice: 4,             // 2 real + 2 AI, with feedback
  fixationDuration: 500,
  cueDuration:      1500,

  // 2 attention checks inserted at random positions in main trials
  nAttentionChecks: 2,
};

/* ═══════════════════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════════════════ */
function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function sample(arr,n){ return shuffle(arr).slice(0,n); }

function assignDurations(stims) {
  const seq=[];
  while(seq.length<stims.length) seq.push(...shuffle([...CONFIG.durations]));
  return stims.map((s,i)=>({...s, duration:seq[i]}));
}

function buildMainStimuli() {
  return shuffle([
    ...assignDurations(shuffle([...sample(POOL_REAL_F,CONFIG.nRealF),...sample(POOL_REAL_M,CONFIG.nRealM)])),
    ...assignDurations(shuffle([...sample(POOL_AI_F,CONFIG.nAIF),...sample(POOL_AI_M,CONFIG.nAIM)])),
  ]);
}

function buildPracticeStimuli() {
  return shuffle([
    ...assignDurations([POOL_REAL_F[POOL_REAL_F.length-1], POOL_REAL_M[POOL_REAL_M.length-1]]),
    ...assignDurations([POOL_AI_F[POOL_AI_F.length-1],     POOL_AI_M[POOL_AI_M.length-1]]),
  ]);
}

// Insert attention check indices randomly into the trial sequence
function chooseAttentionPositions(totalTrials, n) {
  const positions = new Set();
  while(positions.size < n) {
    // avoid first 2 and last 2 trials
    positions.add(2 + Math.floor(Math.random() * (totalTrials - 4)));
  }
  return positions;
}

/* ═══════════════════════════════════════════════════════════════
   ETHNICITY LABEL MAP (for attention check options)
═══════════════════════════════════════════════════════════════ */
const ETHNICITY_LABELS = {
  B:  'Black',
  EA: 'East Asian',
  SA: 'South Asian',
  W:  'White',
};
// All possible ethnicities for wrong-option generation
const ALL_ETHNICITIES = Object.values(ETHNICITY_LABELS);

function getWrongEthnicity(correctCode) {
  const wrong = ALL_ETHNICITIES.filter(e => e !== ETHNICITY_LABELS[correctCode]);
  return shuffle(wrong)[0];
}

/* ═══════════════════════════════════════════════════════════════
   jsPsych INIT
═══════════════════════════════════════════════════════════════ */
const jsPsych = initJsPsych({
  show_progress_bar: true,
  message_progress_bar: 'Progress',
  on_finish: function() {
    jsPsych.getDisplayElement().innerHTML = `
      <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;">
        <div class="card" style="max-width:560px;width:92vw;text-align:center;">
          <h2>Experiment Complete</h2>
          <p>Thank you for participating.</p>
        </div>
      </div>
    `;
  }
});
/* ═══════════════════════════════════════════════════════════════
   CONSENT PAGE
═══════════════════════════════════════════════════════════════ */
const consent = {
  type: jsPsychHtmlButtonResponse,
  stimulus: `
  <div style="max-width:660px;width:92vw;margin:0 auto;">
  <div class="main-title">
    Welcome to the Face Authenticity Detection Task
  </div>

  <div class="card" style="text-align:left;">
    <div class="card" style="max-width:660px;width:92vw;text-align:left;">
      <div class="consent-title">Are We Fooled By AI?</div>
      <div class="consent-subtitle">
        Analysing the ability to distinguish between real and AI-generated faces based on exposure time
      </div>

      <div class="consent-section">
        <h3>Researchers</h3>
        <p>We are graduate students studying Artificial Intelligence at Utrecht University (UU), conducting this experiment as part of the course <em>Experimentation in Psychology, Linguistics and AI</em>.</p>
        <p style="margin-top:6px;">Our hypothesis: <em>Does exposure time affect accuracy in distinguishing real faces from AI-generated ones?</em></p>
      </div>

      <div class="consent-section">
        <h3>Invitation and Purpose</h3>
        <p>You are invited to participate in a short perceptual study. The goal is to understand how well people can tell apart real photographs of faces from AI-generated images, and whether the time a face is displayed influences that judgment.</p>
      </div>

      <div class="consent-section">
        <h3>What Participation Involves</h3>
        <p>You will complete a brief practice session followed by 30 experimental trials. Each trial shows a face for a short duration. You will then press a key to indicate whether it was real or AI-generated. The session takes approximately 10–15 minutes.</p>
      </div>

      <div class="consent-section">
        <h3>Potential Risks and Your Rights</h3>
        <p>There are no known risks associated with this study. Participation is entirely voluntary. You may withdraw at any time without consequence, simply by closing the browser window.</p>
      </div>

      <div class="consent-section">
        <h3>Confidentiality</h3>
        <p>All responses are recorded anonymously. No personally identifiable information is collected. Data will be stored securely and used solely for academic research purposes.</p>
      </div>

      <div class="consent-section">
        <h3>Contact</h3>
        <p>If you have questions about this study, please contact us at: c.chetlurvasundhara@students.uu.nl</strong></p>
      </div>

      <div class="consent-agree" onclick="document.getElementById('agreeBox').click()">
        <input type="checkbox" id="agreeBox" onclick="event.stopPropagation();toggleConsent(this)"/>
        <label for="agreeBox">I have read and understood the above information. I agree to participate voluntarily in this study and confirm that I am 18 years of age or older.</label>
      </div>

      <div style="text-align:center;">
        <button class="btn" id="proceedBtn" disabled onclick="proceedFromConsent()">Continue to Instructions →</button>
      </div>
    </div>`,
  choices: [],   // no jsPsych buttons — using custom HTML button
  on_load: function() {
    window.toggleConsent = function(cb) {
      document.getElementById('proceedBtn').disabled = !cb.checked;
    };
    window.proceedFromConsent = function() {
      jsPsych.finishTrial({consented: true});
    };
  },
};

/* ═══════════════════════════════════════════════════════════════
   INSTRUCTIONS
═══════════════════════════════════════════════════════════════ */
const instructions = {
  type: jsPsychHtmlButtonResponse,
  stimulus: `
    <div class="card" style="max-width:560px;width:92vw;">
      <div class="page-title">How the experiment works</div>
      <ol class="step-list">
        <li><span class="step-num">1</span><span>A number appears telling you how long the face will be shown (500, 1000, or 3000 ms). Use this time to prepare.</span></li>
        <li><span class="step-num">2</span><span>The face appears for exactly that duration, then disappears.</span></li>
        <li><span class="step-num">3</span><span>Judge whether it was a <strong>real photograph</strong> or an <strong>AI-generated image</strong>:</span></li>
      </ol>

      <div class="key-row">
        <div class="key-box">
          <div class="key">F</div>
          <div class="key-label">Real face</div>
        </div>
        <div class="key-box">
          <div class="key">J</div>
          <div class="key-label">AI-generated</div>
        </div>
      </div>

      <p style="font-size:.88rem;color:var(--muted);text-align:center;line-height:1.6;">
        Keep your index fingers resting on <strong>F</strong> and <strong>J</strong> throughout.<br>
        Occasionally you may be asked a brief question about the face you just saw.<br>
        We start with <strong>4 practice trials</strong> with feedback before the main experiment.
      </p>
      <div class="hint" style="margin-top:20px;">Press the button below when you are ready.</div>
    </div>`,
  choices: ['Start Practice'],
  button_html: '<button class="btn">%choice%</button>',
};

/* ═══════════════════════════════════════════════════════════════
   FIXATION
═══════════════════════════════════════════════════════════════ */
const fixation = {
  type: jsPsychHtmlKeyboardResponse,
  stimulus: '<div class="fixation">+</div>',
  choices: 'NO_KEYS',
  trial_duration: CONFIG.fixationDuration,
};

/* ═══════════════════════════════════════════════════════════════
   TRIAL BUILDERS
═══════════════════════════════════════════════════════════════ */
function makeCue(stim, phase) {
  return {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: `
      <div class="cue-wrap">
        <div class="cue-label">Face display duration</div>
        <div class="cue-ms">${stim.duration}</div>
        <div class="cue-unit">milliseconds</div>
        <div class="cue-ready">Get ready…</div>
      </div>`,
    choices: 'NO_KEYS',
    trial_duration: CONFIG.cueDuration,
    data: { phase, cued_duration: stim.duration },
  };
}

function makeFaceDisplay(stim, phase) {
  return {
    type: jsPsychImageKeyboardResponse,
    stimulus: stim.img,
    stimulus_width: 360,
    maintain_aspect_ratio: true,
    choices: 'NO_KEYS',
    trial_duration: stim.duration,
    response_ends_trial: false,
    data: { phase, img: stim.img, face_type: stim.type, gender: stim.gender, ethnicity: stim.ethnicity, duration: stim.duration },
  };
}

function makeResponseScreen(stim, phase) {
  return {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: `
      <div class="resp-wrap">
        <div class="resp-prompt">Was the face real or AI-generated?</div>
        <div class="key-row">
          <div class="key-box"><div class="key">F</div><div class="key-label">Real</div></div>
          <div class="key-box"><div class="key">J</div><div class="key-label">AI-generated</div></div>
        </div>
      </div>`,
    choices: [CONFIG.keyReal, CONFIG.keyAI],
    data: {
      phase, img: stim.img, face_type: stim.type,
      gender: stim.gender, ethnicity: stim.ethnicity,
      duration: stim.duration, response_screen: true,
    },
    on_finish: function(data) {
      data.correct = (data.response === CONFIG.keyReal && stim.type === 'real') ||
                     (data.response === CONFIG.keyAI   && stim.type === 'ai');
    },
  };
}

function makeFeedback() {
  return {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: function() {
      const last = jsPsych.data.get().last(1).values()[0];
      if (last.correct) {
        return `<div class="feedback-wrap feedback-correct">
          <div class="feedback-icon">✓</div>
          <div class="feedback-word">Correct</div>
        </div>`;
      } else {
        const ans = last.face_type==='real' ? 'F — Real' : 'J — AI-generated';
        return `<div class="feedback-wrap feedback-incorrect">
          <div class="feedback-icon">✗</div>
          <div class="feedback-word">Incorrect</div>
          <div class="feedback-sub">The correct answer was <strong>${ans}</strong></div>
        </div>`;
      }
    },
    choices: 'NO_KEYS',
    trial_duration: 1400,
  };
}

/* ─── Attention check ─────────────────────────────────────── */
function makeAttentionCheck(stim) {
  // Randomly pick gender or ethnicity question
  const questionType = Math.random() < 0.5 ? 'gender' : 'ethnicity';

  if (questionType === 'gender') {
    const correct = stim.gender === 'F' ? 'Female' : 'Male';
    const wrong   = stim.gender === 'F' ? 'Male'   : 'Female';
    const options = shuffle([correct, wrong]);
    return {
      type: jsPsychHtmlButtonResponse,
      stimulus: `
        <div class="card" style="max-width:480px;width:92vw;">
          <div class="attn-wrap">
            <div class="attn-prompt">Quick question about the face you just saw:<br><br><strong>What was the gender of the person?</strong></div>
          </div>
        </div>`,
      choices: options,
      button_html: '<button class="btn btn-outline" style="min-width:120px;">%choice%</button>',
      data: { phase: 'attention_check', question_type: 'gender', correct_answer: correct },
      on_finish: function(data) {
        data.attn_correct = options[data.response] === correct;
      },
    };
  } else {
    const correctLabel = ETHNICITY_LABELS[stim.ethnicity];
    const wrongLabel   = getWrongEthnicity(stim.ethnicity);
    const options = shuffle([correctLabel, wrongLabel]);
    return {
      type: jsPsychHtmlButtonResponse,
      stimulus: `
        <div class="card" style="max-width:480px;width:92vw;">
          <div class="attn-wrap">
            <div class="attn-prompt">Quick question about the face you just saw:<br><br><strong>What was the ethnicity of the person?</strong></div>
          </div>
        </div>`,
      choices: options,
      button_html: '<button class="btn btn-outline" style="min-width:140px;">%choice%</button>',
      data: { phase: 'attention_check', question_type: 'ethnicity', correct_answer: correctLabel },
      on_finish: function(data) {
        data.attn_correct = options[data.response] === correctLabel;
      },
    };
  }
}

/* ─── Assemble one full trial ─────────────────────────────── */
function buildTrial(stim, phase, showFeedback, withAttentionCheck) {
  const t = [fixation, makeCue(stim, phase), makeFaceDisplay(stim, phase), makeResponseScreen(stim, phase)];
  if (showFeedback)       t.push(makeFeedback());
  if (withAttentionCheck) t.push(makeAttentionCheck(stim));
  return t;
}

/* ═══════════════════════════════════════════════════════════════
   PRACTICE COMPLETE
═══════════════════════════════════════════════════════════════ */
const practiceComplete = {
  type: jsPsychHtmlButtonResponse,
  stimulus: `
    <div class="card" style="max-width:480px;width:92vw;text-align:center;">
      <div class="page-title">Practice Complete ✓</div>
      <p style="font-size:.9rem;color:var(--muted);line-height:1.7;margin-bottom:24px;">
        Great work! The main experiment is about to begin.<br>
        There will be <strong>no feedback</strong> during the main trials.<br><br>
        Remember:<br>
        <strong>F</strong> = Real face &nbsp;&nbsp; <strong>J</strong> = AI-generated
      </p>
    </div>`,
  choices: ['Begin Experiment'],
  button_html: '<button class="btn">%choice%</button>',
};

/* ═══════════════════════════════════════════════════════════════
   ASSEMBLE FULL TIMELINE
═══════════════════════════════════════════════════════════════ */
const practiceStimuli = buildPracticeStimuli();
const mainStimuli     = buildMainStimuli();

// Decide which main trial indices get attention checks
const attnPositions = chooseAttentionPositions(mainStimuli.length, CONFIG.nAttentionChecks);

// Preload
const preload = {
  type: jsPsychPreload,
  images: [...practiceStimuli, ...mainStimuli].map(s => s.img),
  show_detailed_errors: true,
  message: `<div style="text-align:center;padding:40px;font-family:Inter,sans-serif;color:#6b6860;">Loading stimuli…</div>`,
};

// Build main trial sequence with attention checks injected
const mainTrials = mainStimuli.flatMap((s, i) =>
  buildTrial(s, 'main', false, attnPositions.has(i))
);

const timeline = [
  preload,
  consent,
  instructions,
  ...practiceStimuli.flatMap(s => buildTrial(s, 'practice', true, false)),
  practiceComplete,
  ...mainTrials,
];

jsPsych.run(timeline);
</script>
</body>
